{% extends "base.html" %}
{% block title %}Contact — MB MEDIA{% endblock %}
{% block content %}
<div class="page-hero container">
  <h1>Get in touch</h1>
  <p>Questions, bug reports, or takedown requests.</p>
</div>
<section>
  <div class="container">
    <form class="contact-form" id="contactForm" novalidate>
      <div class="field" id="fieldName">
        <label for="cName">Name</label>
        <input type="text" id="cName" name="name" required>
        <div class="error-msg">Please enter your name.</div>
      </div>
      <div class="field" id="fieldEmail">
        <label for="cEmail">Email</label>
        <input type="email" id="cEmail" name="email" required>
        <div class="error-msg">Please enter a valid email address.</div>
      </div>
      <div class="field" id="fieldSubject">
        <label for="cSubject">Subject</label>
        <input type="text" id="cSubject" name="subject" required>
        <div class="error-msg">Please enter a subject.</div>
      </div>
      <div class="field" id="fieldMessage">
        <label for="cMessage">Message</label>
        <textarea id="cMessage" name="message" required></textarea>
        <div class="error-msg">Please enter a message.</div>
      </div>
      <button type="submit" class="btn btn-gold">Send message</button>
      <div id="contactStatus" style="font-size:0.85rem; color:var(--muted);"></div>
    </form>
  </div>
</section>
{% endblock %}
