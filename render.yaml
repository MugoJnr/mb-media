services:
  - type: web
    name: mb-media
    runtime: docker
    plan: starter
    region: ohio
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MAX_CONCURRENT_DOWNLOADS
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: YTDLP_PROXY
        sync: false
      - key: YTDLP_COOKIES_B64
        sync: false
      - key: YTDLP_COOKIES_FILE
        value: /var/data/cookies/server.txt
      - key: DATA_DIR
        value: /var/data
