name: Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping service health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 40 https://mb-media.onrender.com/api/health || true)
            echo "attempt=$i status=$code body=$(cat /tmp/body 2>/dev/null || true)"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 8
          done
          echo "Service did not return 200 after retries"
          exit 0
